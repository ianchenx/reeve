name: Release

on:
  push:
    tags: ['v*']

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install && cd dashboard && bun install

      - name: Build dashboard
        run: cd dashboard && bun run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract section between this version header and the next
          awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "No changelog entry for $VERSION, falling back to auto-generated notes"
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        run: |
          if [ -f /tmp/release-notes.md ] && [ -s /tmp/release-notes.md ]; then
            gh release create "${{ github.ref_name }}" --notes-file /tmp/release-notes.md
          else
            gh release create "${{ github.ref_name }}" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
