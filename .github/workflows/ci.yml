name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install && cd dashboard && bun install

      - name: Typecheck (backend)
        run: bunx tsc --noEmit

      - name: Typecheck (dashboard)
        run: cd dashboard && bunx tsc -b

      - name: Test
        run: bun test
        env:
          REEVE_DIR: /tmp/reeve-test-home

      - name: Lint (dashboard)
        run: cd dashboard && bun run lint

      - name: Build dashboard
        run: cd dashboard && bun run build
